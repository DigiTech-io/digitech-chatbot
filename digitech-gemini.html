<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigiTech Cyber - AI Voice Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">
<meta property="og:title" content="🤖 DigiTech Cyber - AI Voice Assistant" />
<meta property="og:description" content="Bolkar poochhen — AI voice mein jawab dega! Bachharpur Bazar, Sitamarhi" />
<meta property="og:image" content="https://img.icons8.com/fluency/200/bot.png" />
<style>
:root {
  --saffron: #FF6B00;
  --deep: #0d0d1a;
  --card: #13132a;
  --accent: #1a1a3e;
  --white: #f0f4ff;
  --gray: #8892b0;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Baloo 2', 'Noto Sans Devanagari', sans-serif;
  background: var(--deep);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background-image: radial-gradient(ellipse at 20% 50%, rgba(255,107,0,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(26,26,62,0.6) 0%, transparent 60%);
}
.chat-wrapper {
  width: 100%; max-width: 420px;
  display: flex; flex-direction: column;
  height: 92vh; max-height: 750px;
  border-radius: 24px; overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,107,0,0.15);
}
.header {
  background: linear-gradient(135deg, #FF6B00 0%, #e55a00 50%, #cc4400 100%);
  padding: 16px 20px; display: flex; align-items: center; gap: 14px;
  position: relative; overflow: hidden;
}
.header::before {
  content: ''; position: absolute; top: -30px; right: -30px;
  width: 120px; height: 120px; background: rgba(255,255,255,0.08); border-radius: 50%;
}
.avatar {
  width: 48px; height: 48px; background: rgba(255,255,255,0.2);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 22px; border: 2px solid rgba(255,255,255,0.3); flex-shrink: 0;
}
.header-info h2 { color: white; font-size: 17px; font-weight: 800; }
.header-info p { color: rgba(255,255,255,0.85); font-size: 11px; }
.status-dot {
  display: inline-block; width: 7px; height: 7px;
  background: #00ff88; border-radius: 50%; margin-right: 4px;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.3); }
}
.ai-badge {
  margin-left: auto; background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3); border-radius: 20px;
  padding: 4px 10px; font-size: 11px; color: white; font-weight: 600; flex-shrink: 0;
}
.chat-area {
  flex: 1; background: var(--card); overflow-y: auto;
  padding: 16px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth;
}
.chat-area::-webkit-scrollbar { width: 3px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
.msg { display: flex; gap: 10px; animation: slideIn 0.3s ease; }
@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg.bot { flex-direction: row; }
.msg.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, #FF6B00, #e55a00);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0; align-self: flex-end;
}
.bubble {
  max-width: 78%; padding: 10px 14px;
  border-radius: 18px; font-size: 14px; line-height: 1.6;
}
.msg.bot .bubble { background: var(--accent); color: var(--white); border-bottom-left-radius: 4px; }
.msg.user .bubble { background: linear-gradient(135deg, #FF6B00, #e55a00); color: white; border-bottom-right-radius: 4px; }
.typing-indicator {
  display: flex; gap: 5px; align-items: center;
  padding: 10px 14px; background: var(--accent);
  border-radius: 18px; border-bottom-left-radius: 4px; width: fit-content;
}
.typing-indicator span {
  width: 6px; height: 6px; background: var(--gray);
  border-radius: 50%; animation: bounce 1.2s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%,80%,100% { transform: translateY(0); }
  40% { transform: translateY(-5px); }
}
.mic-area {
  background: var(--deep); padding: 14px 16px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.mic-status { font-size: 12px; color: var(--gray); text-align: center; min-height: 16px; }
.mic-status.listening { color: #FF6B00; font-weight: 600; }
.mic-status.speaking { color: #00ff88; font-weight: 600; }
.controls { display: flex; gap: 10px; align-items: center; width: 100%; }
.text-input {
  flex: 1; background: var(--card); border: 1.5px solid rgba(255,107,0,0.25);
  border-radius: 24px; padding: 11px 16px; color: var(--white);
  font-size: 14px; font-family: 'Baloo 2', sans-serif; outline: none; transition: border 0.2s;
}
.text-input:focus { border-color: var(--saffron); }
.text-input::placeholder { color: var(--gray); }
.mic-btn {
  width: 52px; height: 52px; background: linear-gradient(135deg, #FF6B00, #cc4400);
  border: none; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; transition: all 0.2s; box-shadow: 0 4px 20px rgba(255,107,0,0.5); flex-shrink: 0;
}
.mic-btn.listening { background: linear-gradient(135deg, #ff0000, #cc0000); animation: micPulse 1s infinite; }
.mic-btn.speaking { background: linear-gradient(135deg, #00b894, #007a63); }
@keyframes micPulse {
  0%,100% { box-shadow: 0 0 0 6px rgba(255,0,0,0.15); }
  50% { box-shadow: 0 0 0 14px rgba(255,0,0,0.05); }
}
.send-btn {
  width: 44px; height: 44px; background: var(--accent);
  border: 1.5px solid rgba(255,107,0,0.3); border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.2s; flex-shrink: 0; color: var(--saffron);
}
.send-btn:hover { background: var(--saffron); color: white; }
.quick-replies { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 0 4px 42px; animation: slideIn 0.4s ease; }
.qr-btn {
  background: transparent; border: 1.5px solid var(--saffron); color: var(--saffron);
  padding: 6px 12px; border-radius: 20px; font-size: 12px;
  font-family: 'Baloo 2', sans-serif; cursor: pointer; transition: all 0.2s; font-weight: 600;
}
.qr-btn:hover, .qr-btn:active { background: var(--saffron); color: white; }
.date-divider { text-align: center; color: var(--gray); font-size: 11px; margin: 2px 0; }
</style>
</head>
<body>
<div class="chat-wrapper">
  <div class="header">
    <div class="avatar">🏛️</div>
    <div class="header-info">
      <h2>DigiTech Cyber</h2>
      <p><span class="status-dot"></span>AI Voice Assistant • Online</p>
    </div>
    <div class="ai-badge">🤖 AI</div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="date-divider">Aaj</div>
    <div class="msg bot">
      <div class="msg-avatar">🤖</div>
      <div class="bubble">
        🙏 <b>Namaste! Main DigiTech Cyber ka AI Assistant hun!</b><br><br>
        🎤 <b>Mic dabao aur Hindi mein bolein</b> — main turant jawab dunga!<br>
        Ya neeche likhkar bhi poochh sakte hain.
      </div>
    </div>
    <div class="quick-replies">
      <button class="qr-btn" onclick="sendText('Aadhaar card update karna hai')">🪪 Aadhaar</button>
      <button class="qr-btn" onclick="sendText('Train ticket book karna hai')">🚂 Train</button>
      <button class="qr-btn" onclick="sendText('PM Kisan ki jankari chahiye')">🌾 PM Kisan</button>
      <button class="qr-btn" onclick="sendText('Loan ke baare mein batao')">💰 Loan</button>
      <button class="qr-btn" onclick="sendText('Driving licence banana hai')">🚗 Licence</button>
      <button class="qr-btn" onclick="sendText('Sabhi services batao')">📋 All Services</button>
      <button class="qr-btn" onclick="sendText('Contact aur address batao')">📞 Contact</button>
    </div>
  </div>

  <div class="mic-area">
    <div class="mic-status" id="micStatus">🎤 Mic dabao aur bolein — ya neeche likhein</div>
    <div class="controls">
      <input type="text" class="text-input" id="textInput" placeholder="Yahan likhein..." onkeypress="if(event.key==='Enter') sendText()" />
      <button class="send-btn" onclick="sendText()">➤</button>
      <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
    </div>
  </div>
</div>

<script>
// ========================================
// YAHAN APNI GEMINI API KEY PASTE KARO
const GEMINI_API_KEY = "APNI_GEMINI_KEY_YAHAN";
// ========================================

const SYSTEM_PROMPT = `Aap DigiTech Cyber ke friendly AI Assistant hain.

DUKAAN KI DETAILS:
- Naam: DigiTech Cyber
- Pata: Bachharpur Bazar, Azamgarh Panchayat Center, Sitamarhi, Bihar
- Phone: 8210073056
- Timing: Subah 9 baje se Sham 6 baje tak
- Din: Somwar se Shanivaar

SAARI SERVICES:
1. Aadhaar Card - Naya, update, mobile link, print
2. PAN Card - Naya, duplicate, PAN-Aadhaar link
3. Voter ID - Registration, correction
4. Driving Licence - Apply, renewal
5. Cast/Income/Residence Certificate
6. PM Kisan - Registration, eKYC, status
7. Train Ticket - IRCTC, Tatkal, PNR
8. Flight Ticket - Domestic, International
9. GST Registration
10. Saving/Current Account
11. Two/Three/Four Wheeler Loan
12. Business/Personal/LAP Loan
13. Insurance - PMJJBY, PMSBY, APY, PMFBY
14. Competitive Exam Forms - Railway, SSC, Police, Army, Bank
15. WiFi Installation
16. Video/Audio Advertisement

RULES:
- Hamesha Hindi mein jawab do
- Friendly aur helpful raho
- Chhote clear jawab do (3-4 sentences)
- Phone 8210073056 batao jab zarurat ho
- Timing 9 AM to 6 PM, Mon-Sat batao`;

let recognition, isListening = false, isSpeaking = false;
let conversationHistory = [];
const synth = window.speechSynthesis;

function speak(text) {
  if (!synth) return;
  synth.cancel();
  const cleanText = text.replace(/<[^>]*>/g, '').replace(/[₹✅⚠️🚂🌾🪪🛡️📞🤖🙏🏛️💰🚗✈️📋]/g, '');
  const utterance = new SpeechSynthesisUtterance(cleanText);
  utterance.lang = 'hi-IN';
  utterance.rate = 0.9;
  const voices = synth.getVoices();
  const hindiVoice = voices.find(v => v.lang.includes('hi'));
  if (hindiVoice) utterance.voice = hindiVoice;
  utterance.onstart = () => {
    isSpeaking = true;
    document.getElementById('micStatus').textContent = '🔊 AI bol raha hai...';
    document.getElementById('micStatus').className = 'mic-status speaking';
    document.getElementById('micBtn').className = 'mic-btn speaking';
    document.getElementById('micBtn').textContent = '🔊';
  };
  utterance.onend = () => { isSpeaking = false; resetMicUI(); };
  synth.speak(utterance);
}

function resetMicUI() {
  document.getElementById('micStatus').textContent = '🎤 Mic dabao aur bolein — ya neeche likhein';
  document.getElementById('micStatus').className = 'mic-status';
  document.getElementById('micBtn').className = 'mic-btn';
  document.getElementById('micBtn').textContent = '🎤';
}

function toggleMic() {
  if (isSpeaking) { synth.cancel(); isSpeaking = false; resetMicUI(); return; }
  if (isListening) { stopListening(); return; }
  startListening();
}

function startListening() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Voice ke liye Chrome browser use karein!'); return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'hi-IN';
  recognition.interimResults = true;
  recognition.onstart = () => {
    isListening = true;
    document.getElementById('micBtn').className = 'mic-btn listening';
    document.getElementById('micBtn').textContent = '🔴';
    document.getElementById('micStatus').textContent = '🎤 Sun raha hun... bolein!';
    document.getElementById('micStatus').className = 'mic-status listening';
  };
  recognition.onresult = (event) => {
    let transcript = '';
    for (let i = event.resultIndex; i < event.results.length; i++) transcript += event.results[i][0].transcript;
    document.getElementById('textInput').value = transcript;
    if (event.results[event.results.length - 1].isFinal) { stopListening(); setTimeout(() => sendText(transcript), 300); }
  };
  recognition.onerror = () => stopListening();
  recognition.onend = () => { if (isListening) stopListening(); };
  recognition.start();
}

function stopListening() {
  isListening = false;
  if (recognition) recognition.stop();
  resetMicUI();
}

function addMessage(text, isUser) {
  const area = document.getElementById('chatArea');
  document.querySelectorAll('.quick-replies').forEach(el => el.remove());
  const div = document.createElement('div');
  div.className = `msg ${isUser ? 'user' : 'bot'}`;
  div.innerHTML = `${!isUser ? '<div class="msg-avatar">🤖</div>' : ''}<div class="bubble">${text}</div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">🤖</div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

async function sendText(text) {
  const input = document.getElementById('textInput');
  const userText = text || input.value.trim();
  if (!userText) return;
  input.value = '';
  addMessage(userText, true);
  showTyping();
  
  conversationHistory.push({ role: 'user', parts: [{ text: userText }] });
  
  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
        contents: conversationHistory.slice(-10)
      })
    });
    
    const data = await response.json();
    removeTyping();
    
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Maafi chahta hun, thoda issue aaya. 8210073056 par call karein.';
    
    conversationHistory.push({ role: 'model', parts: [{ text: reply }] });
    addMessage(reply, false);
    speak(reply);
    
  } catch (err) {
    removeTyping();
    const errorMsg = 'Network error. Internet check karein ya 8210073056 par call karein.';
    addMessage(errorMsg, false);
    speak(errorMsg);
  }
}

window.speechSynthesis.onvoiceschanged = () => { synth.getVoices(); };
</script>
</body>
</html>
