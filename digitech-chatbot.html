<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigiTech Cyber - CSC Chatbot 🤖</title>

<!-- WhatsApp / Social Media Preview -->

<meta property="og:description" content="Railway Ticket, PM Kisan, Aadhaar, PAN, Insurance — sab ek jagah! Abhi poochhen 👇" />
<meta property="og:image" content="https://img.icons8.com/fluency/200/bot.png" />
<meta property="og:url" content="https://tinyurl.com/DigiTech-Cyber" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="🤖 DigiTech Cyber - CSC Assistant" />
<meta name="twitter:description" content="Railway Ticket, PM Kisan, Aadhaar, PAN, Insurance — sab ek jagah!" />

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --saffron: #FF6B00;
    --deep: #1a1a2e;
    --card: #16213e;
    --accent: #0f3460;
    --green: #00b894;
    --white: #f0f4ff;
    --gray: #8892b0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Baloo 2', 'Noto Sans Devanagari', sans-serif;
    background: var(--deep);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(255,107,0,0.08) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(15,52,96,0.4) 0%, transparent 60%);
  }

  .chat-wrapper {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    height: 92vh;
    max-height: 750px;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,107,0,0.15);
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #FF6B00 0%, #e55a00 50%, #cc4400 100%);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 30%;
    width: 80px; height: 80px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }
  .avatar {
    width: 50px; height: 50px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    border: 2px solid rgba(255,255,255,0.3);
    flex-shrink: 0;
  }
  .header-info h2 {
    color: white;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.3px;
  }
  .header-info p {
    color: rgba(255,255,255,0.85);
    font-size: 12px;
    font-weight: 400;
  }
  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: #00ff88;
    border-radius: 50%;
    margin-right: 5px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.3); }
  }

  /* CHAT AREA */
  .chat-area {
    flex: 1;
    background: var(--card);
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

  /* MESSAGES */
  .msg {
    display: flex;
    gap: 10px;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.bot { flex-direction: row; }
  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, #FF6B00, #e55a00);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    align-self: flex-end;
  }

  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
  }
  .msg.bot .bubble {
    background: var(--accent);
    color: var(--white);
    border-bottom-left-radius: 4px;
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, #FF6B00, #e55a00);
    color: white;
    border-bottom-right-radius: 4px;
  }

  /* QUICK REPLIES */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 16px 4px 54px;
    animation: slideIn 0.4s ease;
  }
  .qr-btn {
    background: transparent;
    border: 1.5px solid var(--saffron);
    color: var(--saffron);
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-family: 'Baloo 2', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
  }
  .qr-btn:hover, .qr-btn:active {
    background: var(--saffron);
    color: white;
    transform: scale(1.03);
  }

  /* DATE DIVIDER */
  .date-divider {
    text-align: center;
    color: var(--gray);
    font-size: 11px;
    margin: 4px 0;
    position: relative;
  }
  .date-divider::before, .date-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 35%;
    height: 1px;
    background: rgba(136,146,176,0.2);
  }
  .date-divider::before { left: 0; }
  .date-divider::after { right: 0; }

  /* INPUT AREA */
  .input-area {
    background: var(--deep);
    padding: 14px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .input-area input {
    flex: 1;
    background: var(--card);
    border: 1.5px solid rgba(255,107,0,0.25);
    border-radius: 24px;
    padding: 12px 18px;
    color: var(--white);
    font-size: 14px;
    font-family: 'Baloo 2', sans-serif;
    outline: none;
    transition: border 0.2s;
  }
  .input-area input:focus {
    border-color: var(--saffron);
  }
  .input-area input::placeholder { color: var(--gray); }

  .send-btn {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, #FF6B00, #e55a00);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 15px rgba(255,107,0,0.4);
    flex-shrink: 0;
  }
  .send-btn:hover { transform: scale(1.1); box-shadow: 0 6px 20px rgba(255,107,0,0.5); }
  .send-btn:active { transform: scale(0.95); }

  .mic-btn {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, #0f3460, #16213e);
    border: 2px solid rgba(255,107,0,0.4);
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    flex-shrink: 0;
  }
  .mic-btn:hover { transform: scale(1.1); }
  .mic-btn.listening {
    background: linear-gradient(135deg, #e55a00, #FF6B00);
    box-shadow: 0 0 0 6px rgba(255,107,0,0.25);
    animation: micPulse 1s infinite;
  }
  @keyframes micPulse {
    0%,100% { box-shadow: 0 0 0 4px rgba(255,107,0,0.25); }
    50% { box-shadow: 0 0 0 10px rgba(255,107,0,0.1); }
  }

  /* TYPING */
  .typing-indicator {
    display: flex; gap: 5px; align-items: center;
    padding: 12px 16px;
    background: var(--accent);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }
  .typing-indicator span {
    width: 7px; height: 7px;
    background: var(--gray);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  .hidden { display: none !important; }

  /* INFO CARD */
  .info-card {
    background: rgba(0,184,148,0.1);
    border: 1px solid rgba(0,184,148,0.3);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13px;
    color: #00b894;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div class="chat-wrapper">
  <!-- HEADER -->
  <div class="header">
    <div class="avatar">🏛️</div>
    <div class="header-info">
      <h2>DigiTech Cyber</h2>
      <p><span class="status-dot"></span>CSC Assistant • Online</p>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chatArea">
    <div class="date-divider">Aaj</div>

    <!-- Welcome message -->
    <div class="msg bot">
      <div class="msg-avatar">🤖</div>
      <div class="bubble">
        🙏 <b>Namaste! DigiTech Cyber mein aapka swagat hai!</b><br><br>
        Main aapka <b>AI Assistant</b> hun. Mujhe batayein main aapki kaise madad kar sakta hun?
      </div>
    </div>
    <div class="quick-replies" id="mainMenu">
      <button class="qr-btn" onclick="handleClick('🚂 Railway Ticket')">🚂 Railway Ticket</button>
      <button class="qr-btn" onclick="handleClick('🚌 Bus Ticket')">🚌 Bus Ticket</button>
      <button class="qr-btn" onclick="handleClick('🌾 PM Kisan')">🌾 PM Kisan</button>
      <button class="qr-btn" onclick="handleClick('🪪 Aadhaar/PAN')">🪪 Aadhaar/PAN</button>
      <button class="qr-btn" onclick="handleClick('🛡️ Insurance')">🛡️ Insurance</button>
      <button class="qr-btn" onclick="handleClick('📞 Contact Karo')">📞 Contact</button>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Likhein ya 🎤 mic se bolein..." onkeypress="handleKey(event)" />
    <button class="mic-btn" id="micBtn" onclick="toggleVoice()" title="Bolke poochhen">🎤</button>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const responses = {
  '🚂 Railway Ticket': {
    msg: `🚂 <b>Railway Ticket Service</b><br><br>
✅ IRCTC se train ticket book karte hain<br>
✅ Tatkal booking available<br>
✅ All classes — Sleeper, 3AC, 2AC, 1AC<br>
✅ PNR status check<br><br>
<b>Charges:</b> ₹30 – ₹50 per ticket<br>
<b>Time:</b> 10 min mein booking`,
    quick: ['📋 PNR Status Check', '⚡ Tatkal Booking', '🏠 Main Menu']
  },
  '🚌 Bus Ticket': {
    msg: `🚌 <b>Bus Ticket Booking</b><br><br>
✅ State roadways & private buses<br>
✅ Online ticket with seat selection<br>
✅ Bihar, UP, Jharkhand routes available<br><br>
<b>Charges:</b> ₹20 – ₹40 per ticket<br>
<b>Instant:</b> Digital ticket milega`,
    quick: ['🗺️ Route Check Karo', '🏠 Main Menu']
  },
  '🌾 PM Kisan': {
    msg: `🌾 <b>PM Kisan Samman Nidhi</b><br><br>
✅ Naya registration karein<br>
✅ Status check karein<br>
✅ e-KYC karein (jaruri hai!)<br>
✅ Bank details update<br>
✅ Installment history dekhein<br><br>
⚠️ <b>e-KYC deadline miss mat karo!</b><br>
<b>Charges:</b> ₹50 – ₹100`,
    quick: ['📝 Naya Registration', '🔍 Status Check', '📱 e-KYC Karo', '🏠 Main Menu']
  },
  '🪪 Aadhaar/PAN': {
    msg: `🪪 <b>Aadhaar & PAN Services</b><br><br>
<b>Aadhaar:</b><br>
✅ Address update<br>
✅ Mobile number link<br>
✅ Aadhaar download/print<br><br>
<b>PAN Card:</b><br>
✅ Naya PAN apply<br>
✅ Lost PAN reprint<br>
✅ PAN-Aadhaar link<br><br>
<b>Charges:</b> ₹50 – ₹150`,
    quick: ['🆔 Aadhaar Update', '🗂️ PAN Card Apply', '🔗 PAN-Aadhaar Link', '🏠 Main Menu']
  },
  '🛡️ Insurance': {
    msg: `🛡️ <b>Insurance & Pension Services</b><br><br>
✅ <b>PMJJBY</b> — Jeevan Bima (₹436/year)<br>
✅ <b>PMSBY</b> — Durghatna Bima (₹20/year)<br>
✅ <b>APY</b> — Atal Pension Yojana<br>
✅ <b>PMFBY</b> — Fasal Bima<br><br>
<b>Charges:</b> ₹50 – ₹100 per registration`,
    quick: ['💰 APY - Pension', '🌾 Fasal Bima', '❤️ Jeevan Bima', '🏠 Main Menu']
  },
  '📞 Contact Karo': {
    msg: `📞 <b>DigiTech Cyber — Humse Milein</b><br><br>
📍 <b>Pata:</b> Bachharpur Bazaar, Sitamarhi, Bihar<br>
📱 <b>Phone:</b> 8210073056<br>
⏰ <b>Timing:</b> Subah 9 baje – Sham 7 baje<br>
📅 <b>Din:</b> Somwar – Shanivaar<br><br>
<div class="info-card">🟢 Abhi khule hain! Aayein ya call karein.</div>`,
    quick: ['📍 Location Dekhein', '🏠 Main Menu']
  },
  '🏠 Main Menu': {
    msg: `🙏 Main menu par wapas aaye!<br>Batayein, main kaise madad karun?`,
    quick: ['🚂 Railway Ticket', '🚌 Bus Ticket', '🌾 PM Kisan', '🪪 Aadhaar/PAN', '🛡️ Insurance', '📞 Contact Karo']
  },
  '📋 PNR Status Check': {
    msg: `🔍 <b>PNR Status Check</b><br><br>Apna 10 digit PNR number leke aayein, hum turant status check karenge!<br><br>Ya Indian Railways website par bhi dekh sakte hain: <b>indianrail.gov.in</b>`,
    quick: ['🚂 Ticket Book Karo', '🏠 Main Menu']
  },
  '⚡ Tatkal Booking': {
    msg: `⚡ <b>Tatkal Booking</b><br><br>✅ AC classes: Subah <b>10 baje</b> se<br>✅ Non-AC: Subah <b>11 baje</b> se<br><br>⚠️ Tatkal charges extra lagte hain<br><b>Document jaruri:</b> ID proof saath laayen`,
    quick: ['🚂 Booking Karo', '🏠 Main Menu']
  },
  '📝 Naya Registration': {
    msg: `📝 <b>PM Kisan Naya Registration</b><br><br><b>Zaruri Documents:</b><br>✅ Aadhaar card<br>✅ Bank passbook<br>✅ Khata/Khasra number (jameen ke kagaz)<br>✅ Mobile number<br><br>Sab lekar aayein, 15 min mein ho jayega!`,
    quick: ['🏠 Main Menu']
  },
  '📱 e-KYC Karo': {
    msg: `📱 <b>PM Kisan e-KYC</b><br><br>⚠️ <b>Bahut Zaruri!</b> Bina e-KYC ke kist nahi aayegi!<br><br>Kya chahiye: Sirf <b>Aadhaar + Mobile number</b><br>Time: <b>5 minute</b><br>Charges: <b>₹30</b> only`,
    quick: ['✅ Abhi Karo', '🏠 Main Menu']
  },
  'default': {
    msg: `Samjha nahi 😊 Neeche diye options mein se chunein ya seedha poochhen — main madad karunga!`,
    quick: ['🚂 Railway Ticket', '🌾 PM Kisan', '🪪 Aadhaar/PAN', '📞 Contact Karo']
  }
};

function addMessage(text, isUser) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg ${isUser ? 'user' : 'bot'}`;
  div.innerHTML = `
    ${!isUser ? '<div class="msg-avatar">🤖</div>' : ''}
    <div class="bubble">${text}</div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addQuickReplies(options) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'quick-replies';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = opt;
    btn.onclick = () => handleClick(opt);
    div.appendChild(btn);
  });
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">🤖</div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function handleClick(text) {
  // Remove existing quick replies
  document.querySelectorAll('.quick-replies').forEach(el => el.remove());
  
  addMessage(text, true);
  showTyping();

  setTimeout(() => {
    removeTyping();
    const resp = responses[text] || responses['default'];
    addMessage(resp.msg, false);
    if (resp.quick) addQuickReplies(resp.quick);
  }, 800);
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  document.querySelectorAll('.quick-replies').forEach(el => el.remove());
  addMessage(text, true);
  showTyping();

  setTimeout(() => {
    removeTyping();
    // Keyword matching
    const t = text.toLowerCase();
    let resp;
    if (t.includes('train') || t.includes('railway') || t.includes('rail') || t.includes('ticket') || t.includes('pnr')) resp = responses['🚂 Railway Ticket'];
    else if (t.includes('bus')) resp = responses['🚌 Bus Ticket'];
    else if (t.includes('kisan') || t.includes('pm kisan') || t.includes('kyc') || t.includes('kist')) resp = responses['🌾 PM Kisan'];
    else if (t.includes('aadhar') || t.includes('aadhaar') || t.includes('pan')) resp = responses['🪪 Aadhaar/PAN'];
    else if (t.includes('insurance') || t.includes('bima') || t.includes('pension') || t.includes('apy')) resp = responses['🛡️ Insurance'];
    else if (t.includes('contact') || t.includes('phone') || t.includes('address') || t.includes('time') || t.includes('timing')) resp = responses['📞 Contact Karo'];
    else resp = responses['default'];

    addMessage(resp.msg, false);
    if (resp.quick) addQuickReplies(resp.quick);
  }, 900);
}


function toggleVoice() {
  const micBtn = document.getElementById('micBtn');
  const input = document.getElementById('userInput');

  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Aapka browser voice input support nahi karta. Chrome use karein!');
    return;
  }

  if (micBtn.classList.contains('listening')) {
    recognition.stop();
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'hi-IN';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    micBtn.classList.add('listening');
    micBtn.textContent = '🔴';
    input.placeholder = 'Sun raha hun... bolein!';
  };

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    input.value = transcript;
    micBtn.classList.remove('listening');
    micBtn.textContent = '🎤';
    input.placeholder = 'Likhein ya 🎤 mic se bolein...';
    setTimeout(() => sendMessage(), 500);
  };

  recognition.onerror = () => {
    micBtn.classList.remove('listening');
    micBtn.textContent = '🎤';
    input.placeholder = 'Likhein ya 🎤 mic se bolein...';
  };

  recognition.onend = () => {
    micBtn.classList.remove('listening');
    micBtn.textContent = '🎤';
    input.placeholder = 'Likhein ya 🎤 mic se bolein...';
  };

  recognition.start();
}

let recognition;
function handleKey(e) {
  if (e.key === 'Enter') sendMessage();
}
</script>
</body>
</html>
